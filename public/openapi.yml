    post:
      tags: [Auth]
      summary: Create an opaque REST session
      operationId: loginRestSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
                database:
                  type: string
      responses:
        '200':
          description: Session established; response includes a Set-Cookie header.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
