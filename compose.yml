services:
  cassie:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "5432:5432"
    environment:
      CASSIE_REST_LISTEN: 0.0.0.0:8080
      CASSIE_PGWIRE_LISTEN: 0.0.0.0:5432
      CASSIE_MIDGE_DATA_DIR: /data/midge
    volumes:
      - cassie-data:/data

volumes:
  cassie-data:
