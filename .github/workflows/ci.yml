name: CI

env:
  RUST_TOOLCHAIN: 1.96.0
  CNTRYL_TOOLS_REPO: https://github.com/cntryl/tools
  CNTRYL_TOOLS_REV: d36dc1c09462a4fd691ed9fdcc4413eb61f0c80c
  RUST_BACKTRACE: '1'

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Prepare CI evidence directory
        run: mkdir -p target/ci-evidence

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup Rust
        uses: actions/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Install cntryl-tools
        run: |
          set -o pipefail
          cargo install --git ${{ env.CNTRYL_TOOLS_REPO }} --rev ${{ env.CNTRYL_TOOLS_REV }} --locked --force 2>&1 | tee target/ci-evidence/install-cntryl-tools.log

      - name: Cargo build
        run: |
          set -o pipefail
          cargo build --locked 2>&1 | tee target/ci-evidence/cargo-build.log

      - name: Cargo test compile
        run: |
          set -o pipefail
          cargo test --locked --no-run 2>&1 | tee target/ci-evidence/cargo-test-compile.log

      - name: Cargo test
        run: |
          set -o pipefail
          cargo test --locked 2>&1 | tee target/ci-evidence/cargo-test.log

      - name: Cargo clippy pedantic
        run: |
          set -o pipefail
          cargo clippy --locked --workspace --all-targets --all-features -- -D warnings -D clippy::pedantic 2>&1 | tee target/ci-evidence/cargo-clippy.log

      - name: Cargo fmt check
        run: |
          set -o pipefail
          cargo fmt --all -- --check 2>&1 | tee target/ci-evidence/cargo-fmt.log

      - name: Validate test conventions
        run: |
          set -o pipefail
          cntryl-tools validate-tests 2>&1 | tee target/ci-evidence/validate-tests.log

      - name: Cargo bench compile
        run: |
          set -o pipefail
          cargo bench --locked --no-run 2>&1 | tee target/ci-evidence/cargo-bench-compile.log

      - name: Install UI dependencies
        run: |
          set -o pipefail
          cd ui
          npm ci 2>&1 | tee ../target/ci-evidence/ui-install.log

      - name: Verify generated adapters are fresh
        run: |
          set -o pipefail
          cd ui
          npm run gen:adapters 2>&1 | tee ../target/ci-evidence/ui-adapters.log
          git diff --exit-code 2>&1 | tee -a ../target/ci-evidence/ui-adapters.log

      - name: UI test
        run: |
          set -o pipefail
          cd ui
          npm test -- --run 2>&1 | tee ../target/ci-evidence/ui-test.log

      - name: UI type-check
        run: |
          set -o pipefail
          cd ui
          npm run type-check 2>&1 | tee ../target/ci-evidence/ui-type-check.log

      - name: UI lint
        run: |
          set -o pipefail
          cd ui
          npm run lint 2>&1 | tee ../target/ci-evidence/ui-lint.log

      - name: UI build
        run: |
          set -o pipefail
          cd ui
          npm run build 2>&1 | tee ../target/ci-evidence/ui-build.log

      - name: Upload failure evidence
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: ci-failure-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            target/ci-evidence
            target/stress
          if-no-files-found: warn
          retention-days: 14
