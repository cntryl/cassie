openapi: 3.1.0
info:
  title: Cassie REST API
  version: 0.1.0
  description: |
    REST API for Cassie admin and operational workflows.

    Public routes:
      - /health
      - /liveness
      - /metrics
      - /targetz (ECS Fargate target group health check)

    All versioned resource APIs live under /api/v1/*. Authenticated browser and REST clients use the server-owned opaque `cassie_session` cookie. Login issues an HttpOnly, SameSite=Strict cookie; password-bearing Authorization headers are not accepted.
    The REST API does not expose first-class `/api/v1/databases` or `/api/v1/schemas` resources.
    Use the authenticated SQL administration endpoints for supported database, schema, table, view, function, and procedure statements.

    Transport policy: request bodies are limited to 8 MiB, HTTP/1 headers to 32 KiB, header reads
    to 10 seconds, and body collection/route execution to 30 seconds. State-changing `/api/`
    requests with bodies require `application/json`; explicit cross-origin browser requests are
    rejected and no permissive CORS policy is advertised; same-origin browser state changes are
    allowed. TLS is required for non-loopback REST
    listeners, and TLS responses emit HSTS. Authenticated/API responses are not cacheable.
servers:
  - url: /
    description: Same-origin admin API server

tags:
  - name: Health
    description: Service health endpoints.
  - name: Auth
    description: Opaque REST session lifecycle endpoints.
  - name: Collections
    description: Collection, document, index, and search resources. Collection creation targets the default database and the `public` schema unless a scoped name is supplied elsewhere.
  - name: Consistency
    description: Projection verification-manifest and consistency-report resources for operational repair workflows.
  - name: Catalog
    description: Authenticated catalog browsing for database-scoped and schema-scoped SQL objects.
  - name: Query
    description: Authenticated SQL administration over HTTP for supported database, schema, table, view, function, and procedure statements.

components:
  securitySchemes:
    cassieAuth:
      type: apiKey
      in: cookie
      name: cassie_session
      description: >-
        Server-owned opaque session cookie. Obtain it from the login endpoint;
        the token value is never persisted in plaintext.
  responses:
    BadRequest:
      description: Malformed request body or invalid parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RequestTimeout:
      description: Request body collection or route execution exceeded the 30-second deadline.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RequestEntityTooLarge:
      description: Request body exceeded the 8 MiB limit.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnsupportedMediaType:
      description: A state-changing API request with a body did not use application/json.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Authenticated user is not authorized for this route.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Resource conflict or uniqueness violation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServiceUnavailable:
      description: Backend unavailable or dependency unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    MethodNotAllowed:
      description: The route exists, but the HTTP method is not supported.
      headers:
        Allow:
          description: Comma-separated methods allowed for the route.
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  parameters:
    CollectionName:
      in: path
      name: collection
      required: true
      description: The router accepts local names, schema-qualified names, or canonical `database.schema.name` identifiers.
      schema:
        type: string
      example: postgres.public.visible_docs
    DocumentId:
      in: path
      name: id
      required: true
      description: Server-generated document identifier.
      schema:
        type: string
    ProjectionId:
      in: path
      name: projection
      required: true
      description: Projection identifier, typically a canonical relation name such as `postgres.public.orders`.
      schema:
        type: string
  schemas:
    Error:
      type: object
      additionalProperties: true
      required:
        - error
      properties:
        error:
          type: string
    StringMap:
      type: object
      additionalProperties:
        type: string
    QueryResultValue:
      oneOf:
        - type: string
        - type: number
        - type: boolean
        - type: array
          items:
            $ref: '#/components/schemas/QueryResultValue'
        - type: object
          additionalProperties: true
        - type: "null"
    QueryResult:
      type: object
      required:
        - columns
        - rows
        - command
      properties:
        columns:
          type: array
          items:
            $ref: '#/components/schemas/ColumnMeta'
        rows:
          type: array
          items:
            type: array
            items:
              $ref: '#/components/schemas/QueryResultValue'
        command:
          type: string
    QueryExplainResponse:
      type: object
      description: SQL explain response with PostgreSQL-style plan rows plus structured plan data for UI rendering.
      required:
        - columns
        - rows
        - command
        - plan
      properties:
        columns:
          type: array
          items:
            $ref: '#/components/schemas/ColumnMeta'
        rows:
          type: array
          items:
            type: array
            items:
              $ref: '#/components/schemas/QueryResultValue'
        command:
          type: string
        plan:
          $ref: '#/components/schemas/QueryExplainPlan'
    QueryExplainPlan:
      type: object
      description: Structured physical-plan summary intended for visual plan explorers.
      required:
        - format_version
        - summary
        - nodes
        - attributes
        - estimates
        - features
        - diagnostics
      properties:
        format_version:
          type: integer
          format: int32
        summary:
          $ref: '#/components/schemas/QueryPlanSummary'
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/QueryPlanNode'
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/QueryPlanAttribute'
        estimates:
          $ref: '#/components/schemas/QueryPlanEstimates'
        features:
          type: array
          items:
            $ref: '#/components/schemas/QueryPlanFeature'
        diagnostics:
          $ref: '#/components/schemas/QueryPlanDiagnostics'
        analyze:
          $ref: '#/components/schemas/QueryPlanAnalyze'
    QueryPlanSummary:
      type: object
      required:
        - collection
        - root_operator
        - access_path
        - selected_cost
        - estimated_rows
        - storage_mode
      properties:
        collection:
          type: string
        root_operator:
          type: string
        access_path:
          type: string
        selected_index:
          type: string
        selected_cost:
          type: integer
          format: int64
        estimated_rows:
          type: integer
          format: int64
        storage_mode:
          type: string
    QueryPlanNode:
      type: object
      required:
        - id
        - label
        - kind
        - detail
        - status
        - badges
        - metrics
      properties:
        id:
          type: string
        label:
          type: string
        kind:
          type: string
        detail:
          type: string
        status:
          type: string
        badges:
          type: array
          items:
            type: string
        metrics:
          type: array
          items:
            $ref: '#/components/schemas/QueryPlanMetric'
    QueryPlanMetric:
      type: object
      required:
        - label
        - value
      properties:
        label:
          type: string
        value:
          type: string
        unit:
          type: string
    QueryPlanAttribute:
      type: object
      required:
        - label
        - value
        - intent
      properties:
        label:
          type: string
        value:
          type: string
        intent:
          type: string
    QueryPlanEstimates:
      type: object
      required:
        - scan_rows
        - index_rows
        - join_rows
        - search_rows
        - vector_rows
        - aggregate_rows
        - scan_cost
        - index_cost
        - selected_cost
        - cost_source
        - rejected_alternatives
      properties:
        scan_rows:
          type: integer
          format: int64
        index_rows:
          type: integer
          format: int64
        join_rows:
          type: integer
          format: int64
        search_rows:
          type: integer
          format: int64
        vector_rows:
          type: integer
          format: int64
        aggregate_rows:
          type: integer
          format: int64
        scan_cost:
          type: integer
          format: int64
        index_cost:
          type: integer
          format: int64
        selected_cost:
          type: integer
          format: int64
        cost_source:
          type: string
        rejected_alternatives:
          type: array
          items:
            type: string
    QueryPlanFeature:
      type: object
      required:
        - id
        - label
        - enabled
        - intent
        - detail
        - node_id
      properties:
        id:
          type: string
        label:
          type: string
        enabled:
          type: boolean
        intent:
          type: string
        detail:
          type: string
        node_id:
          type: string
    QueryPlanDiagnostics:
      type: object
      required:
        - access_path_reason
        - fallback_reason
        - pagination_strategy
        - early_stop
        - projection_shape
        - operator_feedback_state
        - operator_feedback_reason
        - adaptive_enabled
        - adaptive_decision_point
        - adaptive_candidates
        - adaptive_selected_alternative
        - adaptive_reason
        - join_strategy
        - join_fallback_reason
        - rollup_rewrite
        - projection_freshness
      properties:
        access_path_reason:
          type: string
        fallback_reason:
          type: string
        pagination_strategy:
          type: string
        early_stop:
          type: string
        projection_shape:
          type: string
        operator_feedback_state:
          type: string
        operator_feedback_reason:
          type: string
        adaptive_enabled:
          type: boolean
        adaptive_decision_point:
          type: string
        adaptive_candidates:
          type: array
          items:
            type: string
        adaptive_selected_alternative:
          type: string
        adaptive_reason:
          type: string
        join_strategy:
          type: string
        join_fallback_reason:
          type: string
        rollup_rewrite:
          type: string
        projection_freshness:
          type: string
    QueryPlanAnalyze:
      type: object
      required:
        - actual_rows
        - actual_ms
        - operator_actuals
        - diagnostics
      properties:
        actual_rows:
          type: integer
          format: int64
        actual_ms:
          type: integer
          format: int64
        operator_actuals:
          type: array
          items:
            $ref: '#/components/schemas/QueryPlanOperatorActual'
        diagnostics:
          $ref: '#/components/schemas/QueryPlanAnalyzeDiagnostics'
    QueryPlanOperatorActual:
      type: object
      required:
        - operator
        - rows_in
        - rows_out
        - elapsed_ms
        - storage_reads
        - storage_writes
        - temp_writes
        - candidates
        - results
      properties:
        operator:
          type: string
        rows_in:
          type: integer
          format: int64
        rows_out:
          type: integer
          format: int64
        elapsed_ms:
          type: integer
          format: int64
        storage_reads:
          type: integer
          format: int64
        storage_writes:
          type: integer
          format: int64
        temp_writes:
          type: integer
          format: int64
        candidates:
          type: integer
          format: int64
        results:
          type: integer
          format: int64
    QueryPlanAnalyzeDiagnostics:
      type: object
      required:
        - plan_cache_hits_delta
        - plan_cache_misses_delta
        - storage_reads_delta
        - storage_writes_delta
        - temp_writes_delta
        - candidate_count_delta
        - result_count_delta
        - parallel_aggregations_delta
        - parallel_aggregation_fallback_delta
        - parallel_aggregation_workers_delta
        - parallel_aggregation_groups_delta
        - adaptive_plan_decisions_delta
        - adaptive_plan_selected_delta
        - operator_switch_attempts_delta
        - operator_switch_success_delta
        - operator_switch_skips_delta
        - operator_switch_fallbacks_delta
      properties:
        plan_cache_hits_delta:
          type: integer
          format: int64
        plan_cache_misses_delta:
          type: integer
          format: int64
        storage_reads_delta:
          type: integer
          format: int64
        storage_writes_delta:
          type: integer
          format: int64
        temp_writes_delta:
          type: integer
          format: int64
        candidate_count_delta:
          type: integer
          format: int64
        result_count_delta:
          type: integer
          format: int64
        parallel_aggregations_delta:
          type: integer
          format: int64
        parallel_aggregation_fallback_delta:
          type: integer
          format: int64
        parallel_aggregation_workers_delta:
          type: integer
          format: int64
        parallel_aggregation_groups_delta:
          type: integer
          format: int64
        adaptive_plan_decisions_delta:
          type: integer
          format: int64
        adaptive_plan_selected_delta:
          type: integer
          format: int64
        operator_switch_attempts_delta:
          type: integer
          format: int64
        operator_switch_success_delta:
          type: integer
          format: int64
        operator_switch_skips_delta:
          type: integer
          format: int64
        operator_switch_fallbacks_delta:
          type: integer
          format: int64
    QueryExecuteRequest:
      type: object
      description: SQL statement payload for authenticated execution over HTTP.
      required:
        - sql
      properties:
        sql:
          type: string
    QueryValidateRequest:
      type: object
      description: SQL statement payload for authenticated validation over HTTP.
      required:
        - sql
      properties:
        sql:
          type: string
    QueryValidateResponse:
      type: object
      required:
        - valid
        - command
      properties:
        valid:
          type: boolean
        command:
          type: string
        columns:
          type: array
          items:
            $ref: '#/components/schemas/ColumnMeta'
    QueryExplainRequest:
      type: object
      description: SQL statement payload for authenticated plan explanation over HTTP.
      required:
        - sql
      properties:
        sql:
          type: string
    QuerySchemaResponse:
      type: object
      description: Catalog browser grouped by object kind for the SQL admin UI. Labels use canonical `database.schema.name` values when scope is available.
      required:
        - sections
      properties:
        sections:
          type: array
          items:
            $ref: '#/components/schemas/QuerySchemaSection'
    QuerySchemaSection:
      type: object
      description: Stable section grouping for catalog objects.
      required:
        - id
        - label
        - items
      properties:
        id:
          type: string
          enum:
            - tables
            - views
            - indexes
            - udfs
            - procedures
        label:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/QuerySchemaItem'
    QuerySchemaItem:
      type: object
      description: SQL-accessible catalog object. Labels use canonical `database.schema.name` values when scope is available.
      required:
        - id
        - kind
        - label
      properties:
        id:
          type: string
        kind:
          type: string
          enum:
            - table
            - view
            - index
            - udf
            - procedure
        label:
          type: string
        metadata:
          type: string
    ColumnMeta:
      type: object
      required:
        - name
        - data_type
        - type_oid
        - typlen
        - atttypmod
        - format_code
        - nullable
      properties:
        name:
          type: string
        data_type:
          type: string
        type_oid:
          type: integer
        typlen:
          type: integer
        atttypmod:
          type: integer
        format_code:
          type: integer
        nullable:
          type: boolean
    Health:
      type: object
      required:
        - ready
      properties:
        ready:
          type: boolean
        status:
          type: string
        metrics:
          type: object
          additionalProperties: true
        collections:
          type: integer
        version:
          type: string
    CollectionCreateRequest:
      type: object
      description: Create a collection resource in the default database and `public` schema.
      required:
        - name
        - fields
      properties:
        name:
          type: string
          description: Local collection name to create under the default database and `public` schema.
        description:
          type: string
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FieldSpec'
    FieldSpec:
      type: object
      description: Column definition for collection creation.
      required:
        - name
        - type
      properties:
        name:
          type: string
        type:
          type: string
    CreateCollectionResponse:
      type: object
      description: Collection creation acknowledgement.
      required:
        - collection
      properties:
        collection:
          type: string
    SearchRequest:
      type: object
      description: Search-result request body scoped to one collection resource.
      required:
        - field
        - query
      properties:
        field:
          type: string
        query:
          type: string
        metric:
          type: string
        limit:
          type: integer
          minimum: 1
        offset:
          type: integer
          minimum: 0
    CreateDocumentResponse:
      type: object
      description: Document-creation acknowledgement.
      required:
        - id
      properties:
        id:
          type: string
    DeleteDocumentResponse:
      type: object
      description: Document-deletion acknowledgement.
      required:
        - deleted
      properties:
        deleted:
          type: boolean
    CreateIndexRequest:
      type: object
      description: Index-creation request body scoped to one collection resource.
      required:
        - field
      properties:
        field:
          type: string
        kind:
          type: string
          default: vector
        options:
          $ref: '#/components/schemas/StringMap'
    VectorIndexResponse:
      type: object
      description: Vector-index representation for a collection field.
      required:
        - collection
        - field
        - source_field
        - provider
        - model
        - dimensions
        - metric
        - index_type
        - status
      properties:
        collection:
          type: string
        field:
          type: string
        source_field:
          type: string
        provider:
          type: string
        model:
          type: string
        dimensions:
          type: integer
        metric:
          type: string
        index_type:
          type: string
        status:
          type: string
    ExportManifestRequest:
      type: object
      description: Verification-manifest creation options.
      properties:
        instance_id:
          type: string
        generated_ms:
          type: integer
          format: int64
        ttl_ms:
          type: integer
          format: int64
        include_row_hashes:
          type: boolean
    ConsistencyCheckRequest:
      type: object
      description: Consistency-report creation request body.
      required:
        - manifests
      properties:
        manifests:
          type: array
          items:
            type: object
            additionalProperties: true
    ProjectionManifestHashMetadata:
      type: object
      required:
        - algorithm
        - digest_length
        - canonical_encoder_version
        - row_hash_version
        - range_hash_version
        - root_hash_version
      properties:
        algorithm:
          type: string
        digest_length:
          type: integer
        canonical_encoder_version:
          type: integer
        row_hash_version:
          type: integer
        range_hash_version:
          type: integer
        root_hash_version:
          type: integer
    ProjectionManifestRootSummary:
      type: object
      required:
        - digest
        - row_count
        - range_count
        - state
        - computed_ms
      properties:
        digest:
          type: string
        row_count:
          type: integer
          format: int64
        range_count:
          type: integer
          format: int64
        state:
          type: string
        computed_ms:
          type: integer
          format: int64
    ProjectionManifestRangeSummary:
      type: object
      required:
        - range_id
        - row_count
        - digest
        - state
        - computed_ms
      properties:
        range_id:
          type: integer
          format: int64
        first_row_id:
          type:
            - string
            - "null"
        last_row_id:
          type:
            - string
            - "null"
        row_count:
          type: integer
          format: int64
        digest:
          type: string
        state:
          type: string
        computed_ms:
          type: integer
          format: int64
    ProjectionManifestRowHashSummary:
      type: object
      required:
        - row_id
        - digest
        - state
        - computed_ms
      properties:
        row_id:
          type: string
        digest:
          type: string
        state:
          type: string
        computed_ms:
          type: integer
          format: int64
    ProjectionManifest:
      type: object
      required:
        - manifest_version
        - instance_id
        - projection_id
        - projection_kind
        - schema_epoch
        - generated_ms
        - expires_at_ms
        - hash
        - ranges
        - row_hashes
        - manifest_digest
      properties:
        manifest_version:
          type: integer
        instance_id:
          type: string
        projection_id:
          type: string
        projection_version_id:
          type:
            - string
            - "null"
        projection_kind:
          type: string
        schema_epoch:
          type: integer
          format: int64
        projection_definition_hash:
          type:
            - integer
            - "null"
          format: int64
        source_identity:
          type:
            - string
            - "null"
        source_checkpoint:
          type:
            - string
            - "null"
        source_position:
          type:
            - integer
            - "null"
          format: int64
        generated_ms:
          type: integer
          format: int64
        expires_at_ms:
          type: integer
          format: int64
        hash:
          $ref: '#/components/schemas/ProjectionManifestHashMetadata'
        root:
          oneOf:
            - $ref: '#/components/schemas/ProjectionManifestRootSummary'
            - type: "null"
        ranges:
          type: array
          items:
            $ref: '#/components/schemas/ProjectionManifestRangeSummary'
        row_hashes:
          type: array
          items:
            $ref: '#/components/schemas/ProjectionManifestRowHashSummary'
        manifest_digest:
          type: string
    ProjectionCheckReport:
      type: object
      required:
        - report_id
        - created_ms
        - projection_id
        - state
        - compatibility_status
        - manifest_count
        - instance_ids
        - mismatch_count
        - divergent_range_count
        - divergent_row_count
        - stale_manifest_count
        - incompatible_manifest_count
        - unverifiable_count
        - diagnostic_sample
      properties:
        report_id:
          type: string
        created_ms:
          type: integer
          format: int64
        projection_id:
          type: string
        projection_version_id:
          type:
            - string
            - "null"
        state:
          type: string
          enum:
            - consistent
            - divergent
            - stale
            - unverifiable
            - incompatible
        compatibility_status:
          type: string
        manifest_count:
          type: integer
          format: int64
        instance_ids:
          type: array
          items:
            type: string
        root_digest:
          type:
            - string
            - "null"
        manifest_digest:
          type:
            - string
            - "null"
        mismatch_count:
          type: integer
          format: int64
        divergent_range_count:
          type: integer
          format: int64
        divergent_row_count:
          type: integer
          format: int64
        stale_manifest_count:
          type: integer
          format: int64
        incompatible_manifest_count:
          type: integer
          format: int64
        unverifiable_count:
          type: integer
          format: int64
        diagnostic_sample:
          type: array
          items:
            type: string
        last_error:
          type:
            - string
            - "null"
    ProjectionConsistencyReports:
      type: object
      required:
        - reports
      properties:
        reports:
          type: array
          items:
            $ref: '#/components/schemas/ProjectionCheckReport'
    DocumentPayload:
      type: object
      description: Arbitrary JSON document payload stored under a collection resource.
      additionalProperties: true
    Session:
      type: object
      required: [user, database]
      properties:
        user:
          type: string
        database:
          type: string
        role:
          type: string

paths:
  /health:
    get:
      tags: [Health]
      summary: Health status
      operationId: getHealth
      responses:
        '200':
          description: Health snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
        '500':
          $ref: '#/components/responses/ServiceUnavailable'

  /liveness:
    get:
