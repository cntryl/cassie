[package]
name = "cassie"
version = "0.1.0"
edition = "2021"
default-run = "cassie"

[dependencies]
bytes = "1.12"
http-body-util = "0.1"
hyper-util = { version = "0.1", features = ["tokio"] }
tokio = { version = "1.52", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
uuid = { version = "1.23", features = ["v4", "serde"] }
cntryl-midge = { package = "cntryl-midge", git = "https://github.com/cntryl/midge" }
hyper = { version = "1.10", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter"] }
reqwest = { version = "0.13", default-features = false, features = ["rustls", "blocking", "json"] }
argon2 = "0.5"

[dev-dependencies]
tokio-postgres = "0.7"

[profile.dev]
opt-level = 0
