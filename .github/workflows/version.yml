name: Version

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      branch:
        description: Branch name used for the build
        value: ${{ jobs.version.outputs.branch }}
      semver:
        description: GitVersion semver output
        value: ${{ jobs.version.outputs.semver }}
      fullSemVer:
        description: GitVersion fullSemVer output
        value: ${{ jobs.version.outputs.fullSemVer }}

permissions:
  contents: read

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.branch.outputs.branch }}
      semver: ${{ steps.gitversion.outputs.semVer }}
      fullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: '6.x'

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4

      - name: Capture branch
        id: branch
        run: echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Output version
        run: |
          echo "version=${{ steps.gitversion.outputs.semVer }}"
          echo "fullSemVer=${{ steps.gitversion.outputs.fullSemVer }}"
          echo "branch=${{ steps.branch.outputs.branch }}"
